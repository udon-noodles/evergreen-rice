# Hyprlock - Evergreen UI Green Monochrome
# Font: JetBrainsMono
# Palette: Evergreen UI greens (green100 - green1000)
# Install: copy to ~/.config/hypr/hyprlock.conf
# Requires: JetBrainsMono font installed

background {
    monitor =
    color = rgb(10, 31, 27)  # green1000
}

# TIME (updates every second)
label {
    monitor =
    text = $TIME
    color = rgb(82, 189, 149)  # green400
    font_size = 96
    font_family = JetBrainsMono
    position = 0, 200
    halign = center
    valign = center
}

# DATE (updates every minute)
label {
    monitor =
    text = cmd[update:60000] date +"%A, %B %d"
    color = rgb(66, 151, 119)  # green500
    font_size = 22
    font_family = JetBrainsMono
    position = 0, 120
    halign = center
    valign = center
}

# USERNAME
label {
    monitor =
    text = Hi, $USER
    color = rgb(157, 220, 191)  # green300
    font_size = 16
    font_family = JetBrainsMono
    position = 0, -40
    halign = center
    valign = center
}

# PASSWORD INPUT FIELD
input-field {
    monitor =
    size = 340, 55
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.4
    dots_center = true
    dots_rounding = 2
    font_family = JetBrainsMono
    font_size = 14
    outer_color = rgb(82, 189, 149)  # green400
    inner_color = rgb(19, 45, 39)    # green900
    font_color = rgb(241, 250, 245)  # green100
    fade_on_empty = false
    placeholder_text = Enter password...
    hide_input = false
    rounding = 8
    check_color = rgb(82, 189, 149)  # green400
    fail_color = rgb(39, 82, 68)     # green700
    fail_text = <i>Authentication failed</i>
    fail_timeout = 2000
    fail_transition = 300
    position = 0, -100
    halign = center
    valign = center
}

# LOCKED STATUS
label {
    monitor =
    text = LOCKED
    color = rgb(49, 113, 89)  # green600
    font_size = 13
    font_family = JetBrainsMono
    position = 0, -170
    halign = center
    valign = center
}
